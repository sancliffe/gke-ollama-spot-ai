apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  labels:
    app: ollama
spec:
  # Replicas are managed by KEDA. Set to 0 for a scale-to-zero default.
  replicas: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # KEDA manages replicas; Pod restart: always keep one instance ready when scaled up
      restartPolicy: Always
      
      # Spot VMs get 30-second preemption notice; give Ollama time to gracefully shutdown
      terminationGracePeriodSeconds: 25
      
      # CPU TESTING CONFIGURATION:
      # We have removed the GPU nodeSelector to allow scheduling on standard Spot nodes.
      nodeSelector:
        cloud.google.com/gke-spot: "true"          # Still uses Spot VM cost discount
        cloud.google.com/gke-provisioning: spot    # Spot preemptible instances
      
      containers:
      - name: ollama
        image: ollama/ollama:0.1.32
        
        resources:
          # RESOURCE ADJUSTMENT:
          # Increased CPU and Memory to handle LLM inference without a dedicated GPU.
          limits:
            cpu: "4"                  # 4 CPU cores for improved processing
            memory: "16Gi"            # 16GB RAM to accommodate model loading in system memory
          requests:
            cpu: "4"
            memory: "16Gi"
        ports:
        - containerPort: 11434
          name: ollama-api
          protocol: TCP
        
        # Health probes remain standard for Ollama
        readinessProbe:
          httpGet:
            path: "/"
            port: ollama-api
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: "/"
            port: ollama-api
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-storage
          readOnly: false