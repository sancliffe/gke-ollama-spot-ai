apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-gpu
  labels:
    app: ollama
spec:
  # Replicas managed by KEDA. Initial state is 0 for scale-to-zero.
  replicas: 0
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      # Ensures the pod remains ready when scaled up
      restartPolicy: Always
      
      # Provides 25 seconds for Ollama to shut down gracefully during Spot preemption
      terminationGracePeriodSeconds: 25
      
      # AUTOPILOT COMPLIANT NODE SELECTOR:
      # Restricted 'gke-provisioning' key removed to pass GKE Warden validation.
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      
      containers:
      - name: ollama
        image: ollama/ollama:0.1.32
        
        resources:
          # Optimized for CPU-only inference (4 cores, 16GB RAM)
          limits:
            cpu: "4"
            memory: "16Gi"
          requests:
            cpu: "4"
            memory: "16Gi"
        
        ports:
        - containerPort: 11434
          name: ollama-api
          protocol: TCP
        
        # Standard health probes to verify service readiness
        readinessProbe:
          httpGet:
            path: "/"
            port: ollama-api
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        
        livenessProbe:
          httpGet:
            path: "/"
            port: ollama-api
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 2
          failureThreshold: 3
          
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        
        volumeMounts:
        - name: ollama-data
          mountPath: /root/.ollama
      
      volumes:
      - name: ollama-data
        persistentVolumeClaim:
          claimName: ollama-storage
          readOnly: false