# HTTPScaledObject: Configures KEDA HTTP Add-on for traffic-based autoscaling
# Optimized for KEDA v0.13.0 and CPU-based testing.
# Note: This is a third-party CRD from the KEDA HTTP Add-on; Cloud Code validation can be safely ignored
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: ollama-http-scaler
  namespace: default
  # Note: The 'hosts' field is a placeholder. Replace 'ollama.gke.dev' with your actual domain or IP.
spec:
  # UPDATED: v0.13.0 requires 'hosts' as a list instead of a single 'host' string.
  hosts:
    - ollama.gke.dev
  
  scaleTargetRef:
    # Deployment to scale based on HTTP traffic
    name: ollama-cpu
    # Internal ClusterIP service that receives forwarded traffic
    service: ollama-service
    # Service port for traffic routing
    port: 80
  
  replicas:
    # Scale down to 0 when idle to achieve near-zero compute costs
    min: 0      
    # UPDATED: Allows up to 2 pods for testing load balancing on CPU
    max: 2      

# Note: The 'scaledObject' sub-field is omitted to use v0.13.0 defaults.
# Defaults: cooldownPeriod: 300s, pollingInterval: 30s.